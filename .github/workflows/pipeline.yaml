name: DevOps CI/CD

on:
  push:
    branches:
      - main

env:
  ACR_NAME: devopsghacr98421
  ACR_LOGIN_SERVER: devopsghacr98421.azurecr.io
  IMAGE_NAME: devops-node-app
  RESOURCE_GROUP: devops-gha-rg
  CONTAINER_APP_DEV: devops-app-dev
  CONTAINER_APP_PROD: devops-app-prod

jobs:

  build-test:
  runs-on: ubuntu-latest

  defaults:
    run:
      working-directory: app

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test


  security-scan:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: HIGH,CRITICAL


  build-push-image:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build Docker image
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} .

      - name: Push image to ACR
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}


  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-push-image

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Wait for Container App provisioning
        run: |
          while true; do
            STATUS=$(az containerapp show \
            --name $CONTAINER_APP_DEV \
            --resource-group $RESOURCE_GROUP \
            --query properties.provisioningState \
            -o tsv)

            echo "Current state: $STATUS"

            if [ "$STATUS" = "Succeeded" ] || [ "$STATUS" = "Provisioned" ]; then
              break
            fi

            sleep 10
          done

      - name: Deploy DEV container
        run: |
          az containerapp update \
          --name $CONTAINER_APP_DEV \
          --resource-group $RESOURCE_GROUP \
          --image $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}


  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy PROD container
        run: |
          az containerapp update \
          --name $CONTAINER_APP_PROD \
          --resource-group $RESOURCE_GROUP \
          --image $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}